version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      deck-loaders-luma:
        patterns:
          - "*deck*"
          - "*loaders*"
          - "*luma*"
        exclude-patterns:
          - "@geoarrow/deck.gl-layers"
      other:
        patterns:
          - "*"
        exclude-patterns:
          - "*deck*"
          - "*loaders*"
          - "*luma*"
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
      day: "monday"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: "monday"
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
