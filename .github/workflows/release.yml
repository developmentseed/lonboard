name: Release

# Only run on new tags starting with `v`
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build dist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        name: Install Python
        with:
          python-version: "3.11"

      # Note: this should stay synced with the volta-pinned version in
      # package.json
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "18"

      - name: Install JS dependencies
        run: |
          # Note: we use ci for a "clean install", checking the lockfile
          npm ci

      - name: Build JS bundle
        run: |
          npm run build

      - name: Build dist
        run: |
          python -m pip install -U build
          python -m build

      - name: Ensure JS files included
        run: |
          # If no files with path lonboard/static, fail
          unzip -l dist/*.whl | grep "lonboard/static" || exit 1

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          path: ./dist/

  upload_pypi:
    name: Upload release to PyPI
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    environment:
      # Note: this environment must be configured in the repo settings
      name: pypi-release
      url: https://pypi.org/p/lonboard
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: artifact
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        # Optional: test upload to Test PyPI instead of production PyPI
        # with:
        #   repository-url: https://test.pypi.org/legacy/
